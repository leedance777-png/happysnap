<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HappySnap - On-Device AI Recipe Engine</title>
    <!-- 제품 마스터의 0원 기술 스택: 브라우저 인공지능 엔진 포함 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- 신기술: TensorFlow.js & MobileNet (서버비 0원 AI) -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; -webkit-tap-highlight-color: transparent; }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .active-scale:active { transform: scale(0.95); transition: transform 0.1s; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #fb923c; border-radius: 10px; }
        .ai-shimmer { background: linear-gradient(90deg, #f3f4f6 25%, #fff 50%, #f3f4f6 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="bg-neutral-50 text-neutral-900 overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const APP_NAME = "HappySnap";

        const LANGUAGES = {
            ko: { welcome: "사진 한 장으로 느끼는 요리의 행복", cta: "사진 찍기", textCta: "재료 입력", placeholder: "어떤 재료든 입력하세요", processing: "AI가 사진 속 재료를 식별 중...", result: "추천 요리", share: "행복 공유", retry: "다시 하기", watch: "영상 보기", happinessTip: "이 요리는 당신의 하루에 새로운 활력을 줍니다!", copied: "공유 링크가 복사되었습니다!", aiLabel: "AI 감지 재료:", aiAnalysing: "AI 분석 모델 로딩 중..." },
            en: { welcome: "Cooking Happiness in One Snap", cta: "Snap Photo", textCta: "Type Ingredients", placeholder: "Type any ingredient", processing: "AI Identifying ingredients...", result: "Recommended", share: "Share", retry: "Retry", watch: "Watch Video", happinessTip: "This dish will bring fresh energy to your day!", copied: "Link copied!", aiLabel: "AI Detected:", aiAnalysing: "Loading AI Model..." }
        };

        const RECIPE_DB = [
            { id: 1, name: { ko: "토마토 달걀 볶음", en: "Tomato Egg Stir-fry" }, keywords: ["tomato", "egg", "eggs", "tomato egg", "토마토", "계란"], query: "tomato egg stir fry" },
            { id: 2, name: { ko: "김치볶음밥", en: "Kimchi Fried Rice" }, keywords: ["kimchi", "rice", "spam", "kimchi rice", "김치", "볶음밥"], query: "kimchi fried rice" },
            { id: 3, name: { ko: "알리오 올리오", en: "Aglio e Olio" }, keywords: ["garlic", "pasta", "noodle", "spaghetti", "마늘", "파스타"], query: "aglio e olio" },
            { id: 4, name: { ko: "오징어 볶음", en: "Spicy Squid" }, keywords: ["squid", "seafood", "octopus", "오징어", "해물"], query: "spicy stir fried squid" },
            { id: 5, name: { ko: "스테이크", en: "Steak" }, keywords: ["meat", "beef", "steak", "스테이크", "소고기"], query: "how to cook steak" },
            { id: 6, name: { ko: "계란말이", en: "Rolled Omelet" }, keywords: ["egg", "eggs", "omelet", "달걀", "계란말이"], query: "korean rolled omelet" }
        ];

        function App() {
            const [lang, setLang] = useState('ko');
            const [step, setStep] = useState('landing'); 
            const [mode, setMode] = useState('camera'); 
            const [image, setImage] = useState(null);
            const [textInput, setTextInput] = useState("");
            const [result, setResult] = useState(null);
            const [isModelLoading, setIsModelLoading] = useState(false);
            const [detectedLabel, setDetectedLabel] = useState("");

            const t = LANGUAGES[lang] || LANGUAGES.en;
            const imgRef = useRef(null);

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [step, mode, result]);

            const goHome = () => {
                setStep('landing');
                setImage(null);
                setTextInput("");
                setResult(null);
                setDetectedLabel("");
            };

            // --- 천재적 신기술: On-Device ML 분석 엔진 ---
            const runAIInference = async (imgElement) => {
                setDetectedLabel(t.aiAnalysing);
                try {
                    // 0원 비용 모델 로드 (캐시 활용)
                    const model = await mobilenet.load();
                    const predictions = await model.classify(imgElement);
                    
                    // 가장 확률 높은 결과 추출
                    const topResult = predictions[0].className.toLowerCase();
                    setDetectedLabel(topResult);
                    return topResult;
                } catch (error) {
                    console.error("AI Analysis Error:", error);
                    return "";
                }
            };

            const findBestRecipe = (keyword) => {
                const words = keyword.toLowerCase();
                let bestMatch = null;
                let maxScore = -1;

                RECIPE_DB.forEach(recipe => {
                    let score = 0;
                    recipe.keywords.forEach(k => {
                        if (words.includes(k)) score += 50;
                    });
                    if (score > maxScore) {
                        maxScore = score;
                        bestMatch = recipe;
                    }
                });

                if (!bestMatch || maxScore <= 0) {
                    return {
                        id: 999,
                        name: { ko: `${keyword} 요리`, en: `${keyword} Dish` },
                        query: `${keyword} recipe easy`,
                        isDynamic: true
                    };
                }
                return bestMatch;
            };

            const handleStart = async (manualKeyword) => {
                setStep('processing');
                const searchBase = manualKeyword || textInput;

                setTimeout(() => {
                    const match = findBestRecipe(searchBase);
                    setResult({
                        dishName: match.name[lang] || match.name['en'],
                        videoUrl: `https://www.youtube.com/results?search_query=${encodeURIComponent(match.query)}`,
                        isDynamic: match.isDynamic
                    });
                    setStep('result');
                }, 800);
            };

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = async () => {
                        setImage(reader.result);
                        setStep('processing'); // 분석 중 화면으로 이동
                        
                        // 임시 이미지 객체 생성하여 AI 분석 실행
                        const img = new Image();
                        img.src = reader.result;
                        img.onload = async () => {
                            const aiLabel = await runAIInference(img);
                            handleStart(aiLabel);
                        };
                    };
                    reader.readAsDataURL(file);
                }
            };

            const handleShare = async () => {
                const shareText = `HappySnap AI가 추천한 '${result.dishName}'! 🍳`;
                if (navigator.share) {
                    try { await navigator.share({ title: APP_NAME, text: shareText, url: window.location.href }); } catch (err) {}
                } else {
                    navigator.clipboard.writeText(window.location.href);
                    alert(t.copied);
                }
            };

            return (
                <div className="min-h-screen flex flex-col items-center bg-neutral-50 selection:bg-orange-100">
                    <header className="w-full max-w-2xl px-6 py-4 flex justify-between items-center bg-white border-b sticky top-0 z-50">
                        <button onClick={goHome} className="flex items-center gap-2 font-black text-xl text-orange-600 active-scale">
                            <i data-lucide="chef-hat" className="w-7 h-7"></i>
                            <span className="tracking-tighter uppercase">{APP_NAME}</span>
                        </button>
                        <div className="flex items-center gap-2">
                             <span className="text-[10px] font-bold text-neutral-400 border px-2 py-1 rounded-full bg-neutral-50">v5.0 ML</span>
                        </div>
                    </header>

                    <main className="w-full max-w-lg px-6 py-8 flex-1 flex flex-col items-center">
                        {step === 'landing' && (
                            <div className="w-full flex flex-col gap-8 fade-in">
                                <div className="text-center space-y-4">
                                    <h1 className="text-3xl sm:text-4xl font-black leading-tight tracking-tight text-neutral-800">{t.welcome}</h1>
                                    <div className="flex justify-center gap-2 text-orange-500 font-bold items-center">
                                        <i data-lucide="cpu" className="w-4 h-4"></i>
                                        <span className="text-[10px] uppercase tracking-[0.2em]">On-Device Intelligence • 0-Cost</span>
                                    </div>
                                </div>

                                <div className="flex bg-neutral-200 p-1 rounded-2xl shadow-inner">
                                    <button onClick={() => setMode('camera')} className={`flex-1 flex items-center justify-center gap-2 py-3 rounded-xl font-bold transition-all ${mode === 'camera' ? 'bg-white shadow-sm text-orange-600 font-black' : 'text-neutral-500'}`}><i data-lucide="camera" className="w-5 h-5"></i> {t.cta}</button>
                                    <button onClick={() => setMode('text')} className={`flex-1 flex items-center justify-center gap-2 py-3 rounded-xl font-bold transition-all ${mode === 'text' ? 'bg-white shadow-sm text-orange-600 font-black' : 'text-neutral-500'}`}><i data-lucide="message-square" className="w-5 h-5"></i> {t.textCta}</button>
                                </div>

                                {mode === 'camera' ? (
                                    <label className="w-full aspect-square border-4 border-dashed border-neutral-200 rounded-[3rem] flex flex-col items-center justify-center gap-4 bg-white hover:border-orange-200 transition-all cursor-pointer group shadow-sm active-scale">
                                        <div className="bg-orange-100 p-6 rounded-full text-orange-500 group-hover:rotate-12 transition-transform"><i data-lucide="camera" className="w-10 h-10"></i></div>
                                        <span className="font-bold text-neutral-400 group-hover:text-orange-500">{t.cta}</span>
                                        <input type="file" accept="image/*" capture="environment" className="hidden" onChange={handleFileUpload} />
                                    </label>
                                ) : (
                                    <div className="relative">
                                        <textarea value={textInput} onChange={(e) => setTextInput(e.target.value)} placeholder={t.placeholder} className="w-full h-48 p-6 bg-white border-2 border-neutral-100 rounded-[2.5rem] text-lg font-medium focus:border-orange-500 transition-all shadow-inner outline-none resize-none" />
                                        <button disabled={!textInput.trim()} onClick={() => handleStart()} className="absolute bottom-4 right-4 p-4 bg-orange-500 text-white rounded-2xl shadow-lg hover:bg-orange-600 active-scale transition-all disabled:bg-neutral-300"><i data-lucide="send" className="w-6 h-6"></i></button>
                                    </div>
                                )}
                            </div>
                        )}

                        {step === 'processing' && (
                            <div className="flex-1 flex flex-col items-center justify-center space-y-8 fade-in py-20">
                                <div className="relative">
                                    <div className="w-32 h-32 rounded-full border-4 border-orange-100 border-t-orange-500 animate-spin"></div>
                                    <i data-lucide="brain-circuit" className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-orange-500 w-10 h-10 animate-pulse"></i>
                                </div>
                                <div className="text-center space-y-2">
                                    <p className="text-xl font-black text-neutral-700">{t.processing}</p>
                                    <p className="text-xs font-bold text-orange-400 uppercase tracking-widest">{detectedLabel}</p>
                                </div>
                            </div>
                        )}

                        {step === 'result' && (
                            <div className="w-full space-y-6 fade-in pb-10">
                                <div className="bg-white rounded-[3rem] shadow-2xl overflow-hidden border border-neutral-100">
                                    {image && <div className="h-56 bg-neutral-200 border-b relative">
                                        <img src={image} className="w-full h-full object-cover" />
                                        <div className="absolute top-4 right-4 bg-black/60 backdrop-blur-md text-white px-3 py-1 rounded-full text-[10px] font-bold flex items-center gap-1">
                                            <i data-lucide="check-circle" className="w-3 h-3 text-green-400"></i> AI VERIFIED
                                        </div>
                                    </div>}
                                    <div className="p-8 space-y-6">
                                        <div className="text-center space-y-2">
                                            <span className="text-orange-500 font-black text-[10px] uppercase tracking-[0.3em]">{t.result}</span>
                                            <h2 className="text-4xl font-black text-neutral-900 tracking-tight leading-none break-words">{result.dishName}</h2>
                                        </div>
                                        <p className="text-sm text-neutral-500 italic font-medium leading-relaxed text-center px-4">" {t.happinessTip} "</p>
                                        
                                        <div className="grid grid-cols-1 gap-3 pt-4">
                                            <a href={result.videoUrl} target="_blank" rel="noopener noreferrer" className="flex items-center justify-center gap-3 bg-red-600 text-white py-4 rounded-[1.5rem] font-bold text-lg hover:bg-red-700 shadow-xl transition-all active-scale"><i data-lucide="play" className="w-5 h-5 fill-current"></i> {t.watch}</a>
                                            <button onClick={handleShare} className="flex items-center justify-center gap-3 bg-blue-50 text-blue-600 py-4 rounded-[1.5rem] font-bold text-lg hover:bg-blue-100 active-scale"><i data-lucide="share-2" className="w-5 h-5"></i> {t.share}</button>
                                        </div>
                                    </div>
                                </div>
                                <button onClick={goHome} className="w-full flex items-center justify-center gap-2 text-neutral-400 font-bold py-4 hover:text-orange-500 transition-colors"><i data-lucide="refresh-cw" className="w-4 h-4"></i> {t.retry}</button>
                            </div>
                        )}
                    </main>

                    <footer className="w-full max-w-2xl px-6 py-10 text-center border-t border-neutral-100 opacity-40">
                        <p className="text-[10px] text-neutral-400 font-bold uppercase tracking-[0.3em] leading-loose">HappySnap Global Enterprise • Version 5.0 ML<br/>TensorFlow.js Enabled • 0-Cost Infinite Growth</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
