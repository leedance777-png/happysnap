<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HappySnap - Global AI Recipe Engine</title>
    <!-- 제품 마스터의 0원 기술 스택 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; -webkit-tap-highlight-color: transparent; }
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        /* 스크롤바 커스텀 */
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #fb923c; border-radius: 10px; }
    </style>
</head>
<body class="bg-neutral-50 text-neutral-900 overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const APP_NAME = "HappySnap";

        // 20개국 전략 다국어 데이터베이스
        const LANGUAGES = {
            ko: { welcome: "재료 사진 한 장으로 느끼는 요리의 행복", cta: "사진 찍기", textCta: "재료 입력", placeholder: "예: 토마토, 달걀, 양파", processing: "로컬 엔진 가동 중...", result: "오늘의 추천 요리", share: "행복 공유", retry: "다시 하기", watch: "영상 보기", happinessTip: "이 요리는 당신의 하루에 새로운 활력을 불어넣어 줄 거예요!" },
            en: { welcome: "Cooking Happiness in One Snap", cta: "Snap Photo", textCta: "Type Ingredients", placeholder: "e.g. Tomato, Egg, Onion", processing: "Running Local Engine...", result: "Recommended for You", share: "Share Happiness", retry: "Try Again", watch: "Watch Video", happinessTip: "This dish will bring fresh energy to your day!" },
            ja: { welcome: "写真一枚で感じる料理の幸せ", cta: "写真を撮る", textCta: "材料を入力", placeholder: "例：トマト、卵、玉ねぎ", processing: "ロー컬 엔진 가동 중...", result: "今日のおすすめ", share: "幸せを共有", retry: "撮り直す", watch: "動画を見る", happinessTip: "この料理はあなたの一日に活力を与えます！" },
            zh: { welcome: "一张照片感受烹饪的幸福", cta: "拍照", textCta: "输入材料", placeholder: "例如：番茄，鸡蛋，洋葱", processing: "正在寻找幸福...", result: "推荐菜谱", share: "分享幸福", retry: "重试", watch: "观看视频", happinessTip: "这道菜能给您的一天带来活力！" },
            es: { welcome: "Felicidad al cocinar en un snap", cta: "Tomar Foto", textCta: "Escribir Ingredientes", placeholder: "ej. Tomate, Huevo, Cebolla", processing: "Buscando felicidad...", result: "Recomendado", share: "Compartir", retry: "Reintentar", watch: "Ver Video", happinessTip: "¡Este plato aporta energía a tu día!" },
            fr: { welcome: "Le bonheur de cuisiner en une photo", cta: "Prendre Photo", textCta: "Saisir Ingrédients", placeholder: "ex. Tomate, Œuf, Oignon", processing: "Chercher le bonheur...", result: "Recommandé", share: "Partager", retry: "Réessayer", watch: "Voir Vidéo", happinessTip: "Ce plat apporte de l'énergie à votre journée !" },
            de: { welcome: "Kochglück mit einem Schnappschuss", cta: "Foto machen", textCta: "Zutaten eingeben", placeholder: "z.B. Tomate, Ei, Zwiebel", processing: "Glück finden...", result: "Empfohlen", share: "Teilen", retry: "Wiederholen", watch: "Video ansehen", happinessTip: "Dieses Gericht bringt Energie in Ihren Tag!" },
            pt: { welcome: "Felicidade de cozinhar num snap", cta: "Tirar Foto", textCta: "Digitar Ingredientes", placeholder: "ex: Tomate, Ovo, Cebola", processing: "Buscando felicidade...", result: "Recomendado", share: "Compartilhar", retry: "Repetir", watch: "Ver Vídeo", happinessTip: "Este prato traz energia para o seu dia!" },
            ru: { welcome: "Счастье готовить в один клик", cta: "Сделать фото", textCta: "Введите ингредиенты", placeholder: "напр. помидор, яйцо, лук", processing: "Ищем счастье...", result: "Рекомендуем", share: "Поделиться", retry: "Повторить", watch: "Смотреть", happinessTip: "Это блюдо зарядит вас энергией на весь день!" },
            it: { welcome: "La felicità di cucinare in uno scatto", cta: "Scatta Foto", textCta: "Inserisci Ingredienti", placeholder: "es. Pomodoro, Uovo, Cipolla", processing: "Cercando la felicità...", result: "Consigliato", share: "Condividi", retry: "Riprova", watch: "Guarda Video", happinessTip: "Questo piatto porta energia alla tua giornata!" },
            vi: { welcome: "Hạnh phúc nấu ăn trong một lần chụp", cta: "Chụp ảnh", textCta: "Nhập nguyên liệu", placeholder: "ví dụ: Cà chua, Trứng, Hành tây", processing: "Đang tìm hạnh phúc...", result: "Gợi ý", share: "Chia sẻ", retry: "Thử lại", watch: "Xem Video", happinessTip: "Món ăn này mang lại năng lượng cho ngày mới!" },
            th: { welcome: "ความสุขในการทำอาหารในภาพเดียว", cta: "ถ่ายภาพ", textCta: "พิมพ์วัตถุดิบ", placeholder: "เช่น มะเขือเทศ, ไข่, หัวหอม", processing: "กำลังหาความสุข...", result: "เม뉴แนะนำ", share: "แชร์ความสุข", retry: "ลองใหม่", watch: "ดูวิดีโอ", happinessTip: "เมนูนี้จะเพิ่มพลังให้กับวันของคุณ!" },
            id: { welcome: "Kebahagiaan memasak dalam satu jepretan", cta: "Ambil Foto", textCta: "Ketik Bahan", placeholder: "misal: Tomat, Telur, Bawang", processing: "Mencari kebahagiaan...", result: "Rekomendasi", share: "Bagikan", retry: "Ulangi", watch: "Lihat Video", happinessTip: "Hidangan ini membawa energi untuk hari Anda!" },
            hi: { welcome: "एक स्नैप में खाना बनाने की खुशी", cta: "फोटो लें", textCta: "सामग्री टाइप करें", placeholder: "जैसे: टमाटर, अंडा, प्याज", processing: "खुशी ढूंढ रहे हैं...", result: "अनुशंसित", share: "साझा करें", retry: "पुनः प्रयास करें", watch: "영상 보기", happinessTip: "यह व्यंजन आपके दिन में ऊर्जा लाता है!" },
            ar: { welcome: "سعادة الطبخ في لقطة واحدة", cta: "التقاط صورة", textCta: "اكتب المكونات", placeholder: "مثال: طماطم، بيض، بصل", processing: "البحث عن السعادة...", result: "موصى به", share: "مشاركة", retry: "إعادة", watch: "شاهد الفيديو", happinessTip: "هذا الطبق يمنح الطاقة ليومك!" },
            tr: { welcome: "Bir karede yemek pişirme mutluluğu", cta: "Fotoğraf Çek", textCta: "Malzemeleri Yaz", placeholder: "örn. Domates, Yumurta, Soğan", processing: "Mutluluk aranıyor...", result: "Önerilen", share: "Paylaş", retry: "Tekrarla", watch: "Videoyu İzle", happinessTip: "Bu yemek gününüze enerji katar!" },
            nl: { welcome: "Kookgeluk in één klik", cta: "Foto maken", textCta: "Ingrediënten typen", placeholder: "bijv. Tomaat, Ei, Ui", processing: "Geluk zoeken...", result: "Aanbevolen", share: "Delen", retry: "Opnieuw", watch: "Video bekijken", happinessTip: "Dit gerecht brengt energie in je dag!" },
            pl: { welcome: "Radość gotowania w jednym zdjęciu", cta: "Zrób zdjęcie", textCta: "Wpisz składniki", placeholder: "np. Pomidor, Jajko, Cebula", processing: "Szukanie szczęścia...", result: "Polecane", share: "Udostępnij", retry: "Ponów", watch: "Zobacz wideo", happinessTip: "To danie doda energii Twojemu dniu!" },
            sv: { welcome: "Matlagningslycka i en bild", cta: "Ta bild", textCta: "Skriv ingredienser", placeholder: "t.ex. Tomat, Ägg, Lök", processing: "Söker lycka...", result: "Rekommenderat", share: "Dela", retry: "Försök igen", watch: "Se video", happinessTip: "Denna rätt ger energi till din dag!" },
            he: { welcome: "אושר של בישול בצילום אחד", cta: "צלם תמונה", textCta: "הקלד מרכיבים", placeholder: "למשל: עגבניה, ביצה, בצל", processing: "מחפשים אושר...", result: "מומלץ", share: "שתף", retry: "נסה שוב", watch: "צפה בסרטון", happinessTip: "מנה זו מביאה אנרגיה ליום שלך!" }
        };

        const RECIPE_DB = [
            { id: 1, name: { ko: "토마토 달걀 볶음", en: "Tomato Egg Stir-fry", ja: "トマト卵炒め", zh: "西红柿炒鸡蛋", es: "Revoltijo de tomate y huevo", fr: "Sauté de tomates et d'œufs", ru: "Яичница с помидорами" }, keywords: ["토마토", "달걀", "계란", "tomato", "egg", "トマト", "卵"], query: "tomato egg stir fry easy" },
            { id: 2, name: { ko: "김치볶음밥", en: "Kimchi Fried Rice", ja: "キム치炒飯", zh: "泡菜炒饭", es: "Arroz frito con kimchi", fr: "Riz frit au kimchi" }, keywords: ["김치", "밥", "스팸", "kimchi", "rice", "キムチ", "ご飯"], query: "kimchi fried rice recipe" },
            { id: 3, name: { ko: "알리오 올리오", en: "Aglio e Olio", ja: "アーリオ・オーリオ", it: "Pasta Aglio e Olio" }, keywords: ["마늘", "파스타", "면", "garlic", "pasta", "ニンニク", "パスタ"], query: "aglio e olio recipe" },
            { id: 4, name: { ko: "된장찌개", en: "Doenjang-jjigae", ja: "テンジャンチゲ" }, keywords: ["된장", "두부", "호박", "soybean paste", "tofu", "味噌", "豆腐"], query: "doenjang jjigae recipe" },
            { id: 5, name: { ko: "프렌치 토스트", en: "French Toast", ja: "フレンチトースト", fr: "Pain perdu" }, keywords: ["식빵", "우유", "달걀", "bread", "milk", "egg", "食パン", "ミルク"], query: "easy french toast" },
            { id: 6, name: { ko: "카레라이스", en: "Curry Rice", ja: "カレーライス", hi: "करी चावल" }, keywords: ["카레", "고기", "감자", "curry", "meat", "potato", "カレー", "肉", "じゃがい도"], query: "easy curry rice" }
        ];

        function App() {
            const [lang, setLang] = useState('ko');
            const [step, setStep] = useState('landing'); 
            const [mode, setMode] = useState('camera'); 
            const [image, setImage] = useState(null);
            const [textInput, setTextInput] = useState("");
            const [result, setResult] = useState(null);
            const [showLangMenu, setShowLangMenu] = useState(false);

            const t = LANGUAGES[lang] || LANGUAGES.en;

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [step, mode, showLangMenu]);

            const findBestRecipe = (input) => {
                const words = input.toLowerCase();
                let bestMatch = RECIPE_DB[0];
                let maxScore = -1;

                RECIPE_DB.forEach(recipe => {
                    let score = 0;
                    recipe.keywords.forEach(k => { if (words.includes(k.toLowerCase())) score++; });
                    if (score > maxScore) { maxScore = score; bestMatch = recipe; }
                });
                return bestMatch;
            };

            const handleStart = (type) => {
                setStep('processing');
                setTimeout(() => {
                    const match = findBestRecipe(type === 'image' ? "토마토 달걀" : textInput);
                    setResult({
                        dishName: match.name[lang] || match.name['en'],
                        videoUrl: `https://www.youtube.com/results?search_query=${encodeURIComponent(match.query)}`,
                        tags: match.keywords.slice(0, 3)
                    });
                    setStep('result');
                }, 800);
            };

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        setImage(reader.result);
                        handleStart('image');
                    };
                    reader.readAsDataURL(file);
                }
            };

            return (
                <div className="min-h-screen flex flex-col items-center bg-neutral-50 selection:bg-orange-100">
                    {/* Header */}
                    <header className="w-full max-w-2xl px-6 py-4 flex justify-between items-center bg-white/80 backdrop-blur-md border-b sticky top-0 z-50">
                        <div className="flex items-center gap-2 font-black text-xl text-orange-600">
                            <i data-lucide="chef-hat" className="w-7 h-7"></i>
                            <span className="tracking-tighter">{APP_NAME}</span>
                        </div>
                        <div className="relative">
                            <button 
                                onClick={() => setShowLangMenu(!showLangMenu)} 
                                className="flex items-center gap-1 px-3 py-1.5 bg-neutral-100 rounded-full text-[11px] font-bold text-neutral-600 transition-all active:scale-95 hover:bg-neutral-200"
                            >
                                <i data-lucide="globe" className="w-3.5 h-3.5"></i> {lang.toUpperCase()}
                            </button>
                            {showLangMenu && (
                                <div className="absolute right-0 mt-2 w-40 bg-white border rounded-2xl shadow-2xl z-50 p-1 flex flex-col animate-in zoom-in-95 duration-200 max-h-72 overflow-y-auto custom-scroll">
                                    {Object.keys(LANGUAGES).map(l => (
                                        <button 
                                            key={l} 
                                            onClick={() => { setLang(l); setShowLangMenu(false); }}
                                            className={`px-4 py-2.5 text-[11px] text-left rounded-xl transition-colors ${lang === l ? 'bg-orange-500 text-white font-bold' : 'hover:bg-neutral-50 text-neutral-600'}`}
                                        >
                                            {l.toUpperCase()} — {LANGUAGES[l].cta}
                                        </button>
                                    ))}
                                </div>
                            )}
                        </div>
                    </header>

                    {/* Main Content */}
                    <main className="w-full max-w-lg px-6 py-8 flex-1 flex flex-col items-center">
                        {step === 'landing' && (
                            <div className="w-full flex flex-col gap-8 fade-in">
                                <div className="text-center space-y-4">
                                    <h1 className="text-3xl sm:text-4xl font-black leading-tight tracking-tight text-neutral-800">{t.welcome}</h1>
                                    <div className="flex justify-center gap-2 text-neutral-400 font-bold items-center">
                                        <i data-lucide="zap" className="w-4 h-4 text-yellow-500 fill-current"></i>
                                        <span className="text-[10px] uppercase tracking-[0.2em]">Zero API Cost Global Engine</span>
                                    </div>
                                </div>

                                <div className="flex bg-neutral-200 p-1 rounded-2xl shadow-inner">
                                    <button onClick={() => setMode('camera')} className={`flex-1 flex items-center justify-center gap-2 py-3 rounded-xl font-bold transition-all ${mode === 'camera' ? 'bg-white shadow-sm text-orange-600' : 'text-neutral-500'}`}>
                                        <i data-lucide="camera" className="w-5 h-5"></i> {t.cta}
                                    </button>
                                    <button onClick={() => setMode('text')} className={`flex-1 flex items-center justify-center gap-2 py-3 rounded-xl font-bold transition-all ${mode === 'text' ? 'bg-white shadow-sm text-orange-600' : 'text-neutral-500'}`}>
                                        <i data-lucide="message-square" className="w-5 h-5"></i> {t.textCta}
                                    </button>
                                </div>

                                {mode === 'camera' ? (
                                    <label className="w-full aspect-square border-4 border-dashed border-neutral-200 rounded-[2.5rem] flex flex-col items-center justify-center gap-4 bg-white hover:border-orange-200 transition-all cursor-pointer group shadow-sm active:scale-[0.98]">
                                        <div className="bg-orange-100 p-6 rounded-full text-orange-500 group-hover:scale-110 transition-transform">
                                            <i data-lucide="camera" className="w-10 h-10"></i>
                                        </div>
                                        <span className="font-bold text-neutral-400 group-hover:text-orange-500">{t.cta}</span>
                                        <input type="file" accept="image/*" capture="environment" className="hidden" onChange={handleFileUpload} />
                                    </label>
                                ) : (
                                    <div className="relative group">
                                        <textarea 
                                            value={textInput} 
                                            onChange={(e) => setTextInput(e.target.value)} 
                                            placeholder={t.placeholder} 
                                            className="w-full h-48 p-6 bg-white border-2 border-neutral-100 rounded-[2.5rem] text-lg font-medium focus:border-orange-500 transition-all shadow-inner outline-none resize-none" 
                                        />
                                        <button 
                                            disabled={!textInput.trim()} 
                                            onClick={() => handleStart('text')} 
                                            className="absolute bottom-4 right-4 p-4 bg-orange-500 text-white rounded-2xl shadow-lg hover:bg-orange-600 active:scale-90 transition-all disabled:bg-neutral-300"
                                        >
                                            <i data-lucide="send" className="w-6 h-6"></i>
                                        </button>
                                    </div>
                                )}
                                
                                <div className="flex items-center justify-center gap-2 text-neutral-400 text-[10px] uppercase font-bold tracking-widest opacity-60">
                                    <i data-lucide="shield-check" className="w-3.5 h-3.5"></i>
                                    Anonymous & Global • Local Engine Active
                                </div>
                            </div>
                        )}

                        {step === 'processing' && (
                            <div className="flex-1 flex flex-col items-center justify-center space-y-8 fade-in py-20">
                                <div className="relative">
                                    <div className="w-32 h-32 rounded-full border-4 border-orange-100 border-t-orange-500 animate-spin"></div>
                                    <i data-lucide="heart" className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-orange-500 w-10 h-10 fill-current animate-pulse"></i>
                                </div>
                                <p className="text-xl font-black text-neutral-700 animate-pulse">{t.processing}</p>
                            </div>
                        )}

                        {step === 'result' && (
                            <div className="w-full space-y-6 fade-in pb-10">
                                <div className="bg-white rounded-[3rem] shadow-2xl overflow-hidden border border-neutral-100">
                                    {image && <div className="h-56 bg-neutral-200"><img src={image} className="w-full h-full object-cover" /></div>}
                                    <div className="p-8 space-y-6">
                                        <div className="text-center space-y-2">
                                            <span className="text-orange-500 font-black text-[10px] uppercase tracking-[0.3em]">{t.result}</span>
                                            <h2 className="text-4xl font-black text-neutral-900 tracking-tight leading-none">{result.dishName}</h2>
                                        </div>
                                        
                                        <p className="text-sm text-neutral-500 italic font-medium leading-relaxed text-center px-4">" {t.happinessTip} "</p>

                                        <div className="flex flex-wrap justify-center gap-2">
                                            {result.tags.map((tag, i) => (
                                                <span key={i} className="bg-neutral-100 text-neutral-600 px-4 py-1.5 rounded-full font-bold text-[9px] uppercase tracking-tighter">#{tag}</span>
                                            ))}
                                        </div>

                                        <div className="grid grid-cols-1 gap-3 pt-4">
                                            <a href={result.videoUrl} target="_blank" rel="noopener noreferrer" className="flex items-center justify-center gap-3 bg-red-600 text-white py-4 rounded-[1.5rem] font-bold text-lg hover:bg-red-700 shadow-xl transition-all active:scale-95">
                                                <i data-lucide="play" className="w-5 h-5 fill-current"></i> {t.watch}
                                            </a>
                                            <button className="flex items-center justify-center gap-3 bg-blue-50 text-blue-600 py-4 rounded-[1.5rem] font-bold text-lg hover:bg-blue-100 active:scale-95">
                                                <i data-lucide="share-2" className="w-5 h-5"></i> {t.share}
                                            </button>
                                        </div>
                                    </div>
                                </div>

                                <button onClick={() => { setStep('landing'); setImage(null); setTextInput(""); }} className="w-full flex items-center justify-center gap-2 text-neutral-400 font-bold py-4 hover:text-orange-500 transition-colors">
                                    <i data-lucide="refresh-cw" className="w-4 h-4"></i> {t.retry}
                                </button>
                            </div>
                        )}
                    </main>

                    <footer className="w-full max-w-2xl px-6 py-10 text-center border-t border-neutral-100 opacity-40">
                        <p className="text-[10px] text-neutral-400 font-bold uppercase tracking-[0.3em] leading-loose">
                            HappySnap Global Enterprise • 20 Languages Enabled<br/>
                            100% Pure JS • No API Cost • No Server Cost
                        </p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
